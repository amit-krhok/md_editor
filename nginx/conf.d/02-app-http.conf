# HTTP reverse proxy (works out of the box). For HTTPS, add zz-https.local.conf
# from the example and publish 443 in docker-compose.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10M;
    client_body_timeout 30s;

    proxy_connect_timeout 60s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header X-Frame-Options "DENY" always;
    server_tokens off;

    if ($http_x_original_url ~* ".+") {
        return 403;
    }
    if ($http_x_rewrite_url ~* ".+") {
        return 403;
    }

    location = /robots.txt {
        add_header Content-Security-Policy "default-src 'self'" always;
        default_type text/plain;
        return 200 "User-agent: *\nDisallow:\n";
    }

    location = /sitemap.xml {
        add_header Content-Security-Policy "default-src 'self'" always;
        default_type application/xml;
        return 200 '<?xml version="1.0" encoding="UTF-8"?><urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"></urlset>';
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";
        proxy_http_version 1.1;
        proxy_pass http://md_editor_api/;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://md_editor_ui;
    }
}
