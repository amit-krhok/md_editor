services:
  db:
    container_name: md_editor_db
    image: postgres:18.3
    env_file:
      - .env
    volumes:
      - postgres_data_md_editor:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    restart: always
    ports:
      - "5432:5432"

  api:
    container_name: md_editor_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    restart: always
    ports:
      - "8000:8000"

  ui:
    container_name: md_editor_ui
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    environment:
      PORT: "3045"
    ports:
      - "3045:3045"
    depends_on:
      - api
    networks:
      - backend_net
    restart: always

  nginx:
    container_name: md_editor_nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${MD_EDITOR_CERT_DIR:-./certs}:/etc/md_editor/certs:ro
    depends_on:
      - api
      - ui
    networks:
      - backend_net
      - frontend_net

networks:
  backend_net:
    name: md_editor_backend
    internal: true
  frontend_net:
    name: md_editor_frontend

volumes:
  postgres_data_md_editor:
